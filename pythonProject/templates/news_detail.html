{% extends "base.html" %}
{% block content %}

<div class="container">

<div class="news-block">

    <h2>{{ item.title }}</h2>

    <div class="meta">
        📍 {{ item.location }} |
        📅 {{ item.date }} |
        ⚔ {{ item.casualties_estimate }}
    </div>

    <img src="{{ url_for('static', filename='images/' + item.image) }}" class="news-img-detail">

    <div>
        {{ item.content | safe }}
    </div>

    <br>

    <a href="{{ item.source }}" target="_blank">
        Источник
    </a>

    <hr style="margin:30px 0; border:1px solid #333;">

    <div style="display:flex; justify-content:space-between;">

        {% if prev_news %}
        <a href="{{ url_for('news_detail', news_id=prev_news.id) }}">
            ← Назад
        </a>
        {% else %}
        <span></span>
        {% endif %}

        <a href="{{ url_for('news') }}">
            К списку
        </a>

        {% if next_news %}
        <a href="{{ url_for('news_detail', news_id=next_news.id) }}">
            Вперёд →
        </a>
        {% endif %}

    </div>

</div>

</div>

{% endblock %}
