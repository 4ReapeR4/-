{% extends "base.html" %}
{% block content %}

<div class="main-container">
  <div class="news-column">
    {% for item in news_list %}
      <div class="news-block">
        {% if item.image %}
        <img src="{{ url_for('static', filename=item.image) }}" class="news-img">
        {% endif %}
        <h2>{{ item.title }}</h2>
        <p>{{ item.short_description }}</p>
        <a href="{{ url_for('news_detail', news_id=item.id) }}">Читать далее →</a>
      </div>
    {% endfor %}
  </div>

  <div class="pet-container">
    <img src="{{ url_for('static', filename='images/pet-normal.png') }}" class="pet pet-normal">
    <img src="{{ url_for('static', filename='images/pet-hover.png') }}" class="pet pet-hover">

    <div class="eye left"><div class="pupil"></div></div>
    <div class="eye right"><div class="pupil"></div></div>
  </div>
</div>

{% endblock %}
