<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News System</title>
<style>

body {
    margin:0;
    background:#111;
    color:#ddd;
    font-family:Arial;
}

.container {
    max-width:1000px;
    margin:40px auto;
    gap:30px;
}

@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
    }
}

.news-block {
    background:#1c1c1c;
    border-radius:14px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
}

.news-block:hover {
    transform: translateY(-6px);
    background:#252525;
    box-shadow:0 12px 30px rgba(0,0,0,0.7);
}

.news-image {
    width:100%;
    height:180px;
    object-fit:cover;
}

.news-content {
    padding:20px;
}

.news-content h2 {
    margin:0 0 10px 0;
    color:#ffdd57;
}

.meta {
    font-size:13px;
    color:#888;
    margin-bottom:10px;
}

.news-content p {
    font-size:14px;
    color:#ccc;
}

.news-grid {
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:30px;
}
</style>
</head>
<body>

{% block content %}{% endblock %}

</body>
</html>
